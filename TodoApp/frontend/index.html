<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ToDo</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
    <header class="header">
        <div class="title-wrap">
            <h1 class="title">ToDo список</h1>
            <span class="title__icon">🗓️</span>
        </div>

        <div class="toolbar">
            <div class="toolbar__group">
                <input id="searchInput" class="input input--search" placeholder="Поиск…" />
            </div>
            <div class="toolbar__group">
                <label class="label">Сортировка активных:</label>
                <select id="sortActive" class="input input--select">
                    <option value="newest">Новейшие</option>
                    <option value="oldest">Старейшие</option>
                    <option value="dueAsc">Срок ↑</option>
                    <option value="dueDesc">Срок ↓</option>
                    <option value="prio">Приоритет</option>
                </select>
            </div>
            <div class="toolbar__group">
                <label class="label">Сортировка завершенных:</label>
                <select id="sortCompleted" class="input input--select">
                    <option value="newest">Новейшие</option>
                    <option value="oldest">Старейшие</option>
                    <option value="dueAsc">Срок ↑</option>
                    <option value="dueDesc">Срок ↓</option>
                    <option value="prio">Приоритет</option>
                </select>
            </div>
            <div class="toolbar__group">
                <button id="themeToggle" type="button" class="btn">Тема</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <div class="input-box">
                <input id="titleInput" class="input" placeholder="Название задачи…" />
                <select id="prioSelect" class="input">
                    <option value="low">низкий</option>
                    <option value="medium">средний</option>
                    <option value="high">высокий</option>
                </select>
                <input id="dueInput" class="input" type="datetime-local" />
                <button id="btnAdd" class="btn">Добавить</button>
            </div>

            <div class="filters">
                <button class="chip is-active" data-view="all">Все</button>
                <button class="chip" data-view="active">Активные</button>
                <button class="chip" data-view="completed">Завершенные</button>
            </div>
            <div class="filters filters--date">
                <span class="filters__label">Срок:</span>
                <button class="chip is-active" data-date="all">Любой</button>
                <button class="chip" data-date="today">Сегодня</button>
                <button class="chip" data-date="week">На этой неделе</button>
                <button class="chip" data-date="overdue">Просроченные</button>
            </div>
        </section>

        <section class="section section-active">
            <h2>Активные</h2>
            <ul id="listActive" class="list"></ul>
        </section>

        <section class="section section-completed">
            <h2>Завершенные</h2>
            <ul id="listCompleted" class="list"></ul>
        </section>
    </main>
    <div id="modalDelete" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal__content">
            <h3 class="modal__title">Удалить задачу?</h3>
            <p id="modalDeleteText" class="modal__text">Вы уверены, что хотите удалить эту задачу?</p>
            <div class="modal__actions">
                <button id="modalCancel" class="action">Отмена</button>
                <button id="modalConfirm" class="action action--danger">Удалить</button>
            </div>
        </div>
    </div>
    <script src="./src/main.js"></script>
</body>

</html>
