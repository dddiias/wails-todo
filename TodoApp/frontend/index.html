<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="stylesheet" href="./src/style.css" />
    <title>TodoApp</title>
</head>

<body>
    <main class="page">
        <section class="card app-card">
            <header class="card__header">
                <h1 class="title">ToDo List</h1>
                <span class="title__icon">🗓️</span>
            </header>

            <div class="addform">
                <input type="text" id="taskInput" class="input" placeholder="Add your task" />
                <input type="date" id="dueInput" class="input input--date" />
                <select id="priorityInput" class="input input--select">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <button id="addBtn" type="button" class="btn btn--primary">
                    <span class="btn__icon">＋</span>
                </button>
            </div>

            <p id="hint" class="hint">Click a task to toggle done. Use Undo in “Completed”.</p>

            <div class="filters">
                <button id="fltAll" class="chip chip--filter is-active">All</button>
                <button id="fltActive" class="chip chip--filter">Active</button>
                <button id="fltCompleted" class="chip chip--filter">Completed</button>
            </div>

            <section class="task-section section-active">
                <h2 class="section-title">Active</h2>
                <ul id="taskListActive" class="list"></ul>
            </section>

            <section class="task-section section-completed">
                <h2 class="section-title">Completed</h2>
                <ul id="taskListCompleted" class="list list--completed"></ul>
            </section>
        </section>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal__card">
            <p class="modal__text">Удалить задачу?</p>
            <div class="modal__actions">
                <button id="confirmYes" type="button" class="btn btn--danger">Удалить</button>
                <button id="confirmNo" type="button" class="btn">Отмена</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
